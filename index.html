<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Flowers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .greetings {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            font-size: clamp(24px, 8vw, 48px);
            font-weight: bold;
            margin-bottom: 16px;
        }

        .description {
            font-size: clamp(14px, 4vw, 20px);
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .button button {
            padding: 12px 28px;
            font-size: clamp(14px, 4vw, 18px);
            cursor: pointer;
        }

        .button button a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>

    <div class="greetings">
        <span>H</span>
        <span>A</span>
        <span>L</span>
        <span>O</span>
        <span>&nbsp;</span>
        <span>M</span>
        <span>I</span>
        <span>&nbsp;</span> 
        <span>A</span>
        <span>M</span>
        <span>O</span>
        <span>R</span>
        <span>❤️</span>
    </div>
    
    <div class="description">
        <span>i have something for uuuu!!</span>
    </div>
    
    <div class="button">
        <button>
            <a href="flower.html">Klik disini</a>
        </button>
    </div>
</body>
</html>
